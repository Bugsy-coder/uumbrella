<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Umbrella & Transit</title>
    <style>
        :root { --bg: #121212; --accent: #00d2ff; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: white; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            transition: background 1s;
        }
        #card { 
            margin-top: 20px; z-index: 10; width: 100%; max-width: 400px;
            background: rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; 
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #answer { font-size: 5rem; font-weight: 800; margin: 10px 0; }
        #details { font-size: 1rem; opacity: 0.8; margin-bottom: 20px; white-space: pre-wrap; }
        .stop { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.1); 
            border-radius: 12px; text-align: left;
        }
        .stop-info { cursor: pointer; flex-grow: 1; }
        .map-btn { background: var(--accent); color: black; padding: 8px 12px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.8rem; }
        #debug { font-size: 0.7rem; color: #666; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="card">
        <p id="answer">⌛</p>
        <p id="details">Initializing...</p>
        <div id="stops"></div>
        <div id="debug">System Log: Starting...</div>
    </div>

    <script>
        let uLat, uLon;
        const log = (msg) => { document.getElementById('debug').innerText = "Log: " + msg; console.log(msg); };

        async function findStops(lat, lon) {
            uLat = lat; uLon = lon;
            log(`Location found: ${lat.toFixed(3)}, ${lon.toFixed(3)}`);
            document.getElementById('details').innerText = "Scanning for Translink stops...";
            
            // The Query: Bus, Train, Tram stops within 1.5km
            const q = `[out:json];(node(around:1500)["highway"="bus_stop"];node(around:1500)["railway"~"station|stop"];node(around:1500)["public_transport"~"platform|station"];);out;`;
            
            // WE ARE USING A PROXY TO BYPASS BROWSER BLOCKS
            const proxy = "https://corsproxy.io/?";
            const target = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(q);

            try {
                log("Fetching from Overpass via Proxy...");
                const res = await fetch(proxy + target);
                const data = await res.json();
                
                if(!data.elements || data.elements.length === 0) {
                    log("No stops in data packet.");
                    document.getElementById('details').innerText = "No stops found within 1.5km.";
                    return;
                }

                log(`Found ${data.elements.length} objects.`);
                document.getElementById('answer').innerText = "🚏";
                document.getElementById('details').innerText = "Stops near you:";
                
                const seen = new Set();
                document.getElementById('stops').innerHTML = data.elements
                    .filter(e => (e.tags.name) && !seen.has(e.tags.name) && seen.add(e.tags.name))
                    .slice(0, 5).map(e => {
                        return `<div class="stop">
                            <div class="stop-info">
                                <strong>${e.tags.name}</strong>
                            </div>
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${e.lat},${e.lon}&travelmode=walking" target="_blank" class="map-btn">WALK</a>
                        </div>`;
                    }).join('');
            } catch(err) { 
                log("Error: " + err.message);
                document.getElementById('details').innerText = "Connection blocked. Please refresh."; 
            }
        }

        // Start
        navigator.geolocation.getCurrentPosition(
            p => findStops(p.coords.latitude, p.coords.longitude),
            () => {
                log("GPS Failed, trying IP...");
                fetch('https://ipapi.co/json/').then(r => r.json()).then(d => findStops(d.latitude, d.longitude));
            }
        );
    </script>
</body>
</html>
